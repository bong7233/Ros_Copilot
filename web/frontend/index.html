<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROS2 Copilot</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --line: #262b36;
      --text: #e6e8ec; --muted: #9aa3b2; --accent: #4f8cff;
      --user-bg: #23385f; --bot-bg: #1d2129;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    header {
      padding: 14px 18px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header button {
      padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--muted);
      border: 1px solid var(--line); border-radius: 8px;
    }
    header button:hover { color: var(--text); border-color: var(--accent); }
    header #wikiBtn { margin-left: auto; }
    #wiki { flex: 1; overflow-y: auto; padding: 20px; }
    .wiki-head {
      max-width: 820px; margin: 0 auto 16px; display: flex; align-items: center; gap: 12px;
    }
    .wiki-head strong { font-size: 15px; }
    .wnode {
      max-width: 820px; margin: 0 auto 14px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px;
    }
    .wtitle { font-weight: 600; font-family: ui-monospace, monospace; margin-bottom: 10px; }
    .wns { color: var(--muted); font-weight: 400; font-size: 12px; }
    .wsec { margin-bottom: 8px; }
    .wsec-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .wsec-row { font-size: 13px; font-family: ui-monospace, monospace; color: #cdd3dd; }
    .wsec-none { font-size: 13px; color: var(--muted); }
    .wdesc-btn { margin-top: 8px; padding: 5px 10px; font-size: 12px; }
    .wdesc { margin-top: 8px; font-size: 13px; color: #cdd6e6; white-space: pre-wrap; }
    #transcripts { flex: 1; overflow-y: auto; padding: 20px; }
    .trec {
      max-width: 820px; margin: 0 auto 14px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px;
    }
    .trec-ts { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .trec-turn { display: flex; gap: 8px; margin-bottom: 6px; }
    .trec-role { font-size: 12px; color: var(--muted); width: 62px; flex: none; }
    .trec-text { white-space: pre-wrap; word-break: break-word; min-width: 0; }
    .trec-tools { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
    #status { flex: 1; overflow-y: auto; padding: 20px; }
    .scard {
      max-width: 820px; margin: 0 auto 14px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px;
    }
    .scard h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); font-weight: 600; }
    .stat { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
    .stat .k { color: var(--muted); font-size: 13px; width: 130px; flex: none; }
    .stat .v { font-family: ui-monospace, monospace; font-size: 13px; color: #cdd3dd; word-break: break-all; }
    .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
    .pill .led { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
    .led.ok { background: #37c871; } .led.bad { background: #ff5f56; } .led.warn { background: #f5b731; }
    .hzrow { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .hzrow .name { width: 150px; flex: none; font-family: ui-monospace, monospace; font-size: 13px; }
    .hzbar { flex: 1; height: 8px; background: #12151b; border-radius: 4px; overflow: hidden; }
    .hzbar > span { display: block; height: 100%; background: var(--accent); }
    .hzrow .hz { width: 74px; flex: none; text-align: right; font-size: 12px; color: var(--muted); }
    .status-meta { max-width: 820px; margin: 0 auto 10px; font-size: 12px; color: var(--muted); }
    #log { flex: 1; overflow-y: auto; padding: 20px; }
    .msg { max-width: 760px; margin: 0 auto 14px; display: flex; gap: 10px; }
    .msg .who { font-size: 12px; color: var(--muted); width: 52px; flex: none; padding-top: 8px; }
    .msg .bubble {
      padding: 10px 14px; border-radius: 12px; white-space: pre-wrap;
      word-break: break-word; background: var(--bot-bg); border: 1px solid var(--line);
    }
    .msg.user .bubble { background: var(--user-bg); border-color: #2f4a7a; }
    .msg.user .who { color: #8fb0ff; }
    #form {
      display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--line);
      max-width: 800px; margin: 0 auto; width: 100%;
    }
    #input {
      flex: 1; resize: none; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--panel); color: var(--text);
      font: inherit;
    }
    #input:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 0 18px; border: none; border-radius: 10px; background: var(--accent);
      color: #fff; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
    .msg .body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .tools { display: flex; flex-direction: column; gap: 4px; }
    .tool {
      font-size: 12px; color: var(--muted); background: #12151b;
      border: 1px solid var(--line); border-radius: 8px; padding: 5px 9px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all;
    }
    .sources { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px; }
    .src-label { color: var(--muted); }
    .src {
      background: #1a2230; border: 1px solid var(--line); border-radius: 6px;
      padding: 2px 8px; color: #9fb4d6; font-family: ui-monospace, monospace;
    }
    .usage { font-size: 11px; color: var(--muted); }
    .hint { max-width: 760px; margin: 0 auto 14px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>ROS2 Copilot</h1>
    <button id="wikiBtn" type="button" title="실행 중인 ROS2 시스템 문서">🗂 시스템 위키</button>
    <button id="transcriptBtn" type="button" title="기록된 에이전트 대화 열람">📜 기록</button>
    <button id="statusBtn" type="button" title="실행 중인 시스템의 실시간 상태">📊 상태</button>
    <button id="reset" type="button" title="대화 기록 초기화">새 대화</button>
  </header>

  <div id="log">
    <div class="hint">
      로봇에게 자연어로 말해보세요. 예: "costmap inflation이 뭐야?" · "좌표 (2,1)로 가줘"<br>
      (도구가 실제로 동작하려면 ROS2 노드들이 함께 실행 중이어야 합니다.)
    </div>
  </div>

  <div id="wiki" hidden>
    <div class="wiki-head">
      <strong>시스템 위키 — 실행 중인 ROS2 그래프</strong>
      <button id="wikiClose" type="button">← 채팅으로</button>
    </div>
    <div id="wikiBody"></div>
  </div>

  <div id="transcripts" hidden>
    <div class="wiki-head">
      <strong>기록 — 에이전트 대화 트랜스크립트</strong>
      <button id="transcriptClose" type="button">← 채팅으로</button>
    </div>
    <div id="transcriptBody"></div>
  </div>

  <div id="status" hidden>
    <div class="wiki-head">
      <strong>실시간 상태 — 실행 중인 시스템 헬스</strong>
      <button id="statusRefresh" type="button">↻ 새로고침</button>
      <button id="statusClose" type="button">← 채팅으로</button>
    </div>
    <div id="statusBody"></div>
  </div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="메시지를 입력하세요…" autocomplete="off"></textarea>
    <button id="send" type="submit">보내기</button>
  </form>

  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const resetBtn = document.getElementById('reset');
    let history = [];  // prior {role, content} text turns for multi-turn context

    function add(who, text, cls) {
      const el = document.createElement('div');
      el.className = 'msg ' + cls;
      el.innerHTML = '<div class="who"></div><div class="bubble"></div>';
      el.querySelector('.who').textContent = who;
      el.querySelector('.bubble').textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el.querySelector('.bubble');
    }

    async function ask(message) {
      // Build a bot message with a tool-activity area, a bubble, and a usage line.
      const el = document.createElement('div');
      el.className = 'msg bot';
      el.innerHTML = '<div class="who">robot</div><div class="body">'
        + '<div class="tools"></div><div class="bubble">…</div>'
        + '<div class="sources"></div><div class="usage"></div></div>';
      log.appendChild(el);
      const toolsEl = el.querySelector('.tools');
      const bubble = el.querySelector('.bubble');
      const sourcesEl = el.querySelector('.sources');
      const usageEl = el.querySelector('.usage');
      const sourceSet = new Set();
      log.scrollTop = log.scrollHeight;

      try {
        const res = await fetch('/api/ask/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history }),
        });
        if (!res.ok || !res.body) throw new Error('HTTP ' + res.status);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let gotFinal = false;
        let finalText = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const frames = buf.split('\n\n');
          buf = frames.pop();  // keep the trailing incomplete frame
          for (const frame of frames) {
            const dataLine = frame.split('\n').find(l => l.startsWith('data:'));
            if (!dataLine) continue;
            const ev = JSON.parse(dataLine.slice(5).trim());
            if (ev.type === 'tool_call') {
              const chip = document.createElement('div');
              chip.className = 'tool';
              chip.textContent = '🔧 ' + ev.name + '(' + JSON.stringify(ev.input) + ')';
              toolsEl.appendChild(chip);
            } else if (ev.type === 'tool_result') {
              const last = toolsEl.lastChild;
              if (last) last.textContent += ' → ' + ev.content.split('\n')[0].slice(0, 80);
              // Show RAG citations as source chips under the answer.
              if (ev.meta && Array.isArray(ev.meta.sources) && ev.meta.sources.length) {
                ev.meta.sources.forEach((s) => sourceSet.add(s));
                sourcesEl.innerHTML = '<span class="src-label">📄 출처:</span>';
                sourceSet.forEach((s) => {
                  const chip = document.createElement('span');
                  chip.className = 'src';
                  chip.textContent = s;
                  sourcesEl.appendChild(chip);
                });
              }
            } else if (ev.type === 'final') {
              bubble.textContent = ev.text || '(빈 응답)';
              finalText = ev.text || '';
              gotFinal = true;
            } else if (ev.type === 'usage') {
              usageEl.textContent = 'tokens: in ' + ev.input_tokens + ' / out ' + ev.output_tokens;
            } else if (ev.type === 'error') {
              bubble.textContent = '오류: ' + ev.message;
              gotFinal = true;
            }
            log.scrollTop = log.scrollHeight;
          }
        }
        if (!gotFinal && bubble.textContent === '…') bubble.textContent = '(응답 없음)';
        if (finalText) {
          history.push({ role: 'user', content: message });
          history.push({ role: 'assistant', content: finalText });
          if (history.length > 20) history = history.slice(-20);  // cap context
        }
      } catch (e) {
        bubble.textContent = '오류: ' + e.message;
      }
      log.scrollTop = log.scrollHeight;
    }

    resetBtn.addEventListener('click', () => {
      history = [];
      log.querySelectorAll('.msg').forEach((e) => e.remove());
      input.focus();
    });

    // ---- System Wiki panel ----
    const wikiBtn = document.getElementById('wikiBtn');
    const wikiPanel = document.getElementById('wiki');
    const wikiBody = document.getElementById('wikiBody');
    const wikiClose = document.getElementById('wikiClose');
    const HIDDEN_TOPICS = new Set(['/parameter_events', '/rosout']);

    const transcriptBtn = document.getElementById('transcriptBtn');
    const transcriptPanel = document.getElementById('transcripts');
    const transcriptBody = document.getElementById('transcriptBody');
    const transcriptClose = document.getElementById('transcriptClose');
    const statusBtn = document.getElementById('statusBtn');
    const statusPanel = document.getElementById('status');
    const statusBody = document.getElementById('statusBody');
    const statusRefresh = document.getElementById('statusRefresh');
    const statusClose = document.getElementById('statusClose');

    let statusTimer = null;
    function stopStatusTimer() {
      if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
    }
    function hidePanels() {
      wikiPanel.hidden = true;
      transcriptPanel.hidden = true;
      statusPanel.hidden = true;
      stopStatusTimer();  // stop polling when leaving the status view
    }
    function showChat() { hidePanels(); log.hidden = false; form.hidden = false; }
    function showWiki() { hidePanels(); log.hidden = true; form.hidden = true; wikiPanel.hidden = false; }
    function showTranscripts() { hidePanels(); log.hidden = true; form.hidden = true; transcriptPanel.hidden = false; }
    function showStatus() { hidePanels(); log.hidden = true; form.hidden = true; statusPanel.hidden = false; }
    wikiClose.addEventListener('click', showChat);
    transcriptClose.addEventListener('click', showChat);
    statusClose.addEventListener('click', showChat);

    wikiBtn.addEventListener('click', async () => {
      showWiki();
      wikiBody.innerHTML = '<div class="wnode">불러오는 중…</div>';
      try {
        const res = await fetch('/api/wiki');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        renderWiki(await res.json());
      } catch (e) {
        wikiBody.innerHTML = '<div class="wnode">오류: ' + e.message
          + ' — ROS2 노드가 실행 중인지 확인하세요.</div>';
      }
    });

    function wikiSection(title, items) {
      const wrap = document.createElement('div');
      wrap.className = 'wsec';
      const label = document.createElement('div');
      label.className = 'wsec-label';
      label.textContent = title;
      wrap.appendChild(label);
      const rows = (items || []).filter((i) => !HIDDEN_TOPICS.has(i.name));
      if (!rows.length) {
        const none = document.createElement('div');
        none.className = 'wsec-none';
        none.textContent = '—';
        wrap.appendChild(none);
        return wrap;
      }
      for (const i of rows) {
        const row = document.createElement('div');
        row.className = 'wsec-row';
        row.textContent = i.name + (i.types && i.types.length ? '  (' + i.types.join(', ') + ')' : '');
        wrap.appendChild(row);
      }
      return wrap;
    }

    function renderWiki(data) {
      const names = Object.keys(data.nodes || {}).sort();
      if (!names.length) {
        wikiBody.innerHTML = '<div class="wnode">실행 중인 노드가 없습니다. '
          + 'ROS2 노드를 먼저 실행하세요.</div>';
        return;
      }
      wikiBody.innerHTML = '';
      for (const name of names) {
        const info = data.nodes[name];
        const card = document.createElement('div');
        card.className = 'wnode';

        const title = document.createElement('div');
        title.className = 'wtitle';
        title.textContent = name + ' ';
        const ns = document.createElement('span');
        ns.className = 'wns';
        ns.textContent = info.namespace || '/';
        title.appendChild(ns);
        card.appendChild(title);

        card.appendChild(wikiSection('Publishes', info.publishers));
        card.appendChild(wikiSection('Subscribes', info.subscribers));
        card.appendChild(wikiSection('Services', info.services));

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'wdesc-btn';
        btn.textContent = '🤖 AI 설명 생성';
        const desc = document.createElement('div');
        desc.className = 'wdesc';
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          desc.textContent = '생성 중…';
          try {
            const r = await fetch('/api/wiki/describe?node=' + encodeURIComponent(name));
            const d = await r.json();
            desc.textContent = d.description || '(설명 없음)';
          } catch (e) {
            desc.textContent = '오류: ' + e.message;
          }
          btn.disabled = false;
        });
        card.appendChild(btn);
        card.appendChild(desc);
        wikiBody.appendChild(card);
      }
    }

    // ---- Transcript viewer ----
    transcriptBtn.addEventListener('click', async () => {
      showTranscripts();
      transcriptBody.innerHTML = '<div class="trec">불러오는 중…</div>';
      try {
        const res = await fetch('/api/transcripts?limit=50');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        renderTranscripts(await res.json());
      } catch (e) {
        transcriptBody.innerHTML = '<div class="trec">오류: ' + e.message + '</div>';
      }
    });

    function fmtTs(ts) {
      const d = new Date(ts);
      return isNaN(d) ? (ts || '') : d.toLocaleString();
    }

    function turnRow(role, text) {
      const row = document.createElement('div');
      row.className = 'trec-turn';
      const r = document.createElement('div');
      r.className = 'trec-role';
      r.textContent = role;
      const t = document.createElement('div');
      t.className = 'trec-text';
      t.textContent = text;
      row.appendChild(r);
      row.appendChild(t);
      return row;
    }

    function renderTranscripts(data) {
      transcriptBody.innerHTML = '';
      if (!data.enabled) {
        transcriptBody.innerHTML = '<div class="trec">기록이 비활성화되어 있습니다. '
          + '서버에서 <code>COPILOT_AGENT_LOG</code> 환경변수에 파일 경로를 지정하면 '
          + '이후 대화가 여기에 표시됩니다.</div>';
        return;
      }
      const records = data.records || [];
      if (!records.length) {
        transcriptBody.innerHTML = '<div class="trec">아직 기록된 대화가 없습니다.</div>';
        return;
      }
      for (const rec of records) {
        const card = document.createElement('div');
        card.className = 'trec';

        const ts = document.createElement('div');
        ts.className = 'trec-ts';
        ts.textContent = fmtTs(rec.ts);
        card.appendChild(ts);

        card.appendChild(turnRow('🧑 사용자', rec.user || ''));

        const tools = rec.tools || [];
        if (tools.length) {
          const wrap = document.createElement('div');
          wrap.className = 'trec-tools';
          for (const t of tools) {
            const chip = document.createElement('div');
            chip.className = 'tool';
            const inp = JSON.stringify(t.input || {});
            let out = (t.result || '').toString();
            if (out.length > 240) out = out.slice(0, 240) + '…';
            chip.textContent = '🔧 ' + t.name + '(' + inp + ') → ' + out;
            wrap.appendChild(chip);
          }
          card.appendChild(wrap);
        }

        card.appendChild(turnRow('🤖 응답', rec.reply || ''));

        if (rec.usage) {
          const u = document.createElement('div');
          u.className = 'usage';
          u.textContent = 'input_tokens=' + (rec.usage.input_tokens ?? '?')
            + ' · output_tokens=' + (rec.usage.output_tokens ?? '?');
          card.appendChild(u);
        }
        transcriptBody.appendChild(card);
      }
    }

    // ---- Live status panel (auto-refreshes while open) ----
    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        renderStatus(await res.json());
      } catch (e) {
        statusBody.innerHTML = '<div class="scard">오류: ' + e.message
          + ' — ROS2 노드가 실행 중인지 확인하세요.</div>';
      }
    }
    statusBtn.addEventListener('click', () => {
      showStatus();
      statusBody.innerHTML = '<div class="scard">측정 중… (약 2초)</div>';
      loadStatus();
      stopStatusTimer();
      statusTimer = setInterval(loadStatus, 4000);  // live refresh while open
    });
    statusRefresh.addEventListener('click', loadStatus);

    function statRow(k, v) {
      return '<div class="stat"><span class="k">' + k + '</span>'
        + '<span class="v">' + v + '</span></div>';
    }
    function pill(state, text) {
      // state: 'ok' | 'bad' | 'warn' | '' (unknown)
      return '<span class="pill"><span class="led ' + state + '"></span>' + text + '</span>';
    }
    function esc(s) {
      return String(s).replace(/[&<>]/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    function renderStatus(d) {
      const cards = [];

      // Nodes
      const nn = (d.nodes && d.nodes.names) || [];
      cards.push('<div class="scard"><h3>노드</h3>'
        + statRow('활성 노드', (d.nodes ? d.nodes.count : 0) + '개')
        + (nn.length ? statRow('목록', esc(nn.join(', '))) : '')
        + '</div>');

      // Safety + robot
      let safety = '<div class="scard"><h3>안전 · 로봇</h3>';
      if (d.estop == null) {
        safety += statRow('E-stop', pill('', '알 수 없음 (/copilot/estop 없음)'));
      } else if (d.estop.engaged) {
        safety += statRow('E-stop', pill('bad', '작동됨 — 모션 차단'));
      } else {
        safety += statRow('E-stop', pill('ok', '정상'));
      }
      if (d.robot) {
        safety += statRow('위치', 'x=' + d.robot.x + '  y=' + d.robot.y
          + '  yaw=' + d.robot.yaw + ' rad');
      } else {
        safety += statRow('위치', pill('', '오도메트리 없음 (/odom)'));
      }
      safety += '</div>';
      cards.push(safety);

      // Services / action
      const sv = d.services || {};
      cards.push('<div class="scard"><h3>서비스 · 액션</h3>'
        + statRow('RAG 질의', sv.rag ? pill('ok', '연결됨') : pill('bad', '없음'))
        + statRow('실행기 액션', sv.executor_action ? pill('ok', '연결됨') : pill('bad', '없음'))
        + '</div>');

      // Topic rates
      const topics = d.topics || [];
      let hz = '<div class="scard"><h3>토픽 발행 주기 (Hz)</h3>';
      if (!topics.length) {
        hz += '<div class="stat"><span class="v">모니터링 대상 토픽이 없습니다.</span></div>';
      } else {
        const max = Math.max(1, ...topics.map((t) => t.hz));
        for (const t of topics) {
          const pct = Math.round((t.hz / max) * 100);
          const led = t.hz > 0 ? 'ok' : 'warn';
          hz += '<div class="hzrow"><span class="name">'
            + '<span class="pill"><span class="led ' + led + '"></span></span> ' + esc(t.name)
            + '</span><span class="hzbar"><span style="width:' + pct + '%"></span></span>'
            + '<span class="hz">' + t.hz.toFixed(1) + ' Hz</span></div>';
        }
      }
      hz += '</div>';
      cards.push(hz);

      const meta = '<div class="status-meta">' + d.window_sec
        + '초 측정 · 4초마다 자동 새로고침 · ' + new Date().toLocaleTimeString()
        + '</div>';
      statusBody.innerHTML = meta + cards.join('');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      add('you', message, 'user');
      input.value = '';
      sendBtn.disabled = true;
      await ask(message);
      sendBtn.disabled = false;
      input.focus();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });
  </script>
</body>
</html>
