<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROS2 Copilot</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --line: #262b36;
      --text: #e6e8ec; --muted: #9aa3b2; --accent: #4f8cff;
      --user-bg: #23385f; --bot-bg: #1d2129;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    header {
      padding: 14px 18px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header #reset {
      margin-left: auto; padding: 6px 12px; font-size: 13px; font-weight: 500;
      background: transparent; color: var(--muted);
      border: 1px solid var(--line); border-radius: 8px;
    }
    header #reset:hover { color: var(--text); border-color: var(--accent); }
    #log { flex: 1; overflow-y: auto; padding: 20px; }
    .msg { max-width: 760px; margin: 0 auto 14px; display: flex; gap: 10px; }
    .msg .who { font-size: 12px; color: var(--muted); width: 52px; flex: none; padding-top: 8px; }
    .msg .bubble {
      padding: 10px 14px; border-radius: 12px; white-space: pre-wrap;
      word-break: break-word; background: var(--bot-bg); border: 1px solid var(--line);
    }
    .msg.user .bubble { background: var(--user-bg); border-color: #2f4a7a; }
    .msg.user .who { color: #8fb0ff; }
    #form {
      display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--line);
      max-width: 800px; margin: 0 auto; width: 100%;
    }
    #input {
      flex: 1; resize: none; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--panel); color: var(--text);
      font: inherit;
    }
    #input:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 0 18px; border: none; border-radius: 10px; background: var(--accent);
      color: #fff; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
    .msg .body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .tools { display: flex; flex-direction: column; gap: 4px; }
    .tool {
      font-size: 12px; color: var(--muted); background: #12151b;
      border: 1px solid var(--line); border-radius: 8px; padding: 5px 9px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all;
    }
    .usage { font-size: 11px; color: var(--muted); }
    .hint { max-width: 760px; margin: 0 auto 14px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>ROS2 Copilot</h1>
    <button id="reset" type="button" title="대화 기록 초기화">새 대화</button>
  </header>

  <div id="log">
    <div class="hint">
      로봇에게 자연어로 말해보세요. 예: "costmap inflation이 뭐야?" · "좌표 (2,1)로 가줘"<br>
      (도구가 실제로 동작하려면 ROS2 노드들이 함께 실행 중이어야 합니다.)
    </div>
  </div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="메시지를 입력하세요…" autocomplete="off"></textarea>
    <button id="send" type="submit">보내기</button>
  </form>

  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const resetBtn = document.getElementById('reset');
    let history = [];  // prior {role, content} text turns for multi-turn context

    function add(who, text, cls) {
      const el = document.createElement('div');
      el.className = 'msg ' + cls;
      el.innerHTML = '<div class="who"></div><div class="bubble"></div>';
      el.querySelector('.who').textContent = who;
      el.querySelector('.bubble').textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el.querySelector('.bubble');
    }

    async function ask(message) {
      // Build a bot message with a tool-activity area, a bubble, and a usage line.
      const el = document.createElement('div');
      el.className = 'msg bot';
      el.innerHTML = '<div class="who">robot</div><div class="body">'
        + '<div class="tools"></div><div class="bubble">…</div>'
        + '<div class="usage"></div></div>';
      log.appendChild(el);
      const toolsEl = el.querySelector('.tools');
      const bubble = el.querySelector('.bubble');
      const usageEl = el.querySelector('.usage');
      log.scrollTop = log.scrollHeight;

      try {
        const res = await fetch('/api/ask/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history }),
        });
        if (!res.ok || !res.body) throw new Error('HTTP ' + res.status);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let gotFinal = false;
        let finalText = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const frames = buf.split('\n\n');
          buf = frames.pop();  // keep the trailing incomplete frame
          for (const frame of frames) {
            const dataLine = frame.split('\n').find(l => l.startsWith('data:'));
            if (!dataLine) continue;
            const ev = JSON.parse(dataLine.slice(5).trim());
            if (ev.type === 'tool_call') {
              const chip = document.createElement('div');
              chip.className = 'tool';
              chip.textContent = '🔧 ' + ev.name + '(' + JSON.stringify(ev.input) + ')';
              toolsEl.appendChild(chip);
            } else if (ev.type === 'tool_result') {
              const last = toolsEl.lastChild;
              if (last) last.textContent += ' → ' + ev.content.split('\n')[0].slice(0, 80);
            } else if (ev.type === 'final') {
              bubble.textContent = ev.text || '(빈 응답)';
              finalText = ev.text || '';
              gotFinal = true;
            } else if (ev.type === 'usage') {
              usageEl.textContent = 'tokens: in ' + ev.input_tokens + ' / out ' + ev.output_tokens;
            } else if (ev.type === 'error') {
              bubble.textContent = '오류: ' + ev.message;
              gotFinal = true;
            }
            log.scrollTop = log.scrollHeight;
          }
        }
        if (!gotFinal && bubble.textContent === '…') bubble.textContent = '(응답 없음)';
        if (finalText) {
          history.push({ role: 'user', content: message });
          history.push({ role: 'assistant', content: finalText });
          if (history.length > 20) history = history.slice(-20);  // cap context
        }
      } catch (e) {
        bubble.textContent = '오류: ' + e.message;
      }
      log.scrollTop = log.scrollHeight;
    }

    resetBtn.addEventListener('click', () => {
      history = [];
      log.querySelectorAll('.msg').forEach((e) => e.remove());
      input.focus();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      add('you', message, 'user');
      input.value = '';
      sendBtn.disabled = true;
      await ask(message);
      sendBtn.disabled = false;
      input.focus();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });
  </script>
</body>
</html>
