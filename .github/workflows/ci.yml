name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    name: Python (offline unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest
      - name: Byte-compile all Python
        run: python -m compileall -q ros2_copilot_ws/src eval web/backend
      - name: RAG tests — chunking + reranker (no ROS, no API key)
        run: pytest -q ros2_copilot_ws/src/copilot_rag/test/
        env:
          PYTHONPATH: ros2_copilot_ws/src/copilot_rag
      - name: Wiki tests (grounded mermaid, no API key)
        run: pytest -q ros2_copilot_ws/src/copilot_wiki/test/test_wiki.py
        env:
          PYTHONPATH: ros2_copilot_ws/src/copilot_wiki
      - name: Agent tests (transcript logging, no ROS/key)
        run: pytest -q ros2_copilot_ws/src/copilot_agent/test/
        env:
          PYTHONPATH: ros2_copilot_ws/src/copilot_agent

  ros2-build:
    name: ROS2 colcon build
    runs-on: ubuntu-latest
    container: ros:humble
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools + ROS dependencies
        shell: bash
        run: |
          apt-get update
          # ros:humble is ros-base and may lack colcon / compilers.
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions build-essential cmake git
          rosdep update
          rosdep install --from-paths ros2_copilot_ws/src --ignore-src -r -y \
            --skip-keys "nav2_bringup turtlebot3_gazebo"
      - name: Build (C++ nodes + interfaces + Python packages)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_copilot_ws
          colcon build --event-handlers console_direct+
